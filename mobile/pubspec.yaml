name: inventory_mobile
description: Hotel Inventory Management — Crowne Plaza Dushanbe
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # Local database (Drift / SQLite)
  drift: ^2.18.0
  sqlite3: ^2.4.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Encryption
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0

  # Network
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
